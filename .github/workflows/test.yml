name: "Test"

on:
  pull_request:
  push:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: 5
    - uses: actions/setup-node@v4
    - run: opam install dune
    - run: opam exec -- dune build olorin.opam
    - run: opam install . --deps-only
    - run: npm install
    # Build static/ (OCaml -> JS, webpack bundle, copy z3/coi runtime assets).
    - run: npm run build:static
    # Install only the browser the suite uses, with its OS dependencies.
    - run: npx playwright install --with-deps chromium
    - run: npm run test:e2e
    # Keep the HTML report (and traces of any retried failures) for debugging.
    - if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14
