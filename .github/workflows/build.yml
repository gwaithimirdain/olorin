name: "Build"

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: 5
    - uses: actions/setup-node@v4
    - run: opam install dune
    - run: opam exec -- dune build olorin.opam
    - run: opam install . --deps-only
    - run: npm install
    # Build static/ (OCaml -> JS, webpack bundle, copy z3/coi runtime assets).
    - run: npm run build:static
    # Browser interaction tests.  These run before the Pages artifact is uploaded, so a
    # failure fails this job and skips the dependent "deploy" job: tests gate deployment.
    - run: npx playwright install --with-deps chromium
    - run: npm run test:e2e
    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14
    - name: Upload static files as artifact
      id: deployment
      uses: actions/upload-pages-artifact@v3
      with:
        path: static/
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
